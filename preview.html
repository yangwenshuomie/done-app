<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
<title>Done — 視覺預覽</title>
<style>
:root {
  --bg: oklch(97.2% 0.007 78);
  --surface: oklch(99.2% 0.004 78);
  --ink: oklch(16.5% 0.012 78);
  --ink-2: oklch(47.5% 0.011 78);
  --ink-3: oklch(72% 0.008 78);
  --line: oklch(91.5% 0.007 78);
  --danger: oklch(56% 0.18 23);
  --radius: 18px;
  --font: 'Figtree', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: oklch(88% 0.012 78);
  min-height: 100vh;
  display: flex;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  padding: 40px;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

.label {
  text-align: center;
  font-size: 11px;
  font-family: var(--font);
  color: oklch(40% 0.008 78);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 500;
}

.phone {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 50px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,.18), 0 0 0 10px oklch(18% 0 0);
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header { padding: 54px 20px 0; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; line-height: 1; }
.logo em { font-style: italic; color: var(--ink-2); }
.stats-pill { display: flex; gap: 14px; }
.stat { text-align: right; }
.stat-num { font-size: 16px; font-weight: 500; line-height: 1; }
.stat-label { font-size: 9px; font-weight: 300; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }

/* ── Date strip ── */
.date-strip-outer { flex-shrink: 0; border-bottom: 1px solid var(--line); padding: 12px 0 0; margin-top: 14px; }
.date-strip-top { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 10px; }
.month-label { font-size: 13px; font-weight: 500; color: var(--ink); }
.date-strip { display: flex; gap: 6px; overflow-x: auto; padding: 0 20px 12px; }
.date-strip::-webkit-scrollbar { display: none; }
.dpill {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 44px; height: 58px; border-radius: 14px; border: 1.5px solid transparent;
  background: none; cursor: pointer; flex-shrink: 0;
}
.dpill .dow { font-size: 10px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 4px; }
.dpill .dnum { font-size: 18px; font-weight: 500; color: var(--ink-2); line-height: 1; }
.dpill .ddot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-3); margin-top: 4px; opacity: 0; }
.dpill.has-done .ddot { opacity: 1; }
.dpill.today .dnum { color: var(--ink); font-weight: 600; }
.dpill.selected { background: var(--ink); border-color: var(--ink); }
.dpill.selected .dow { color: rgba(255,255,255,.6); }
.dpill.selected .dnum { color: #fff; }
.dpill.selected .ddot { background: #fff; opacity: .5; }

/* ── Schedule ── */
.sched-body { flex: 1; display: flex; overflow: hidden; }
.sched-col { flex: 1; overflow-y: auto; padding: 14px 0 100px; }
.sched-col::-webkit-scrollbar { display: none; }
.sched-col-left { padding: 14px 8px 100px 20px; border-right: 1px solid var(--line); background: var(--bg); }
.sched-col-right { padding: 14px 12px 100px 14px; }
.sched-col-header {
  font-size: 10px; font-weight: 500; letter-spacing: .09em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--line);
}

.done-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); }
.done-item:last-child { border-bottom: none; }
.done-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); flex-shrink: 0; margin-top: 6px; }
.done-body { flex: 1; min-width: 0; }
.done-text { font-size: 13px; line-height: 1.4; color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-3); }
.done-meta { display: flex; gap: 4px; margin-top: 3px; }
.done-tag { font-size: 10px; color: var(--ink-2); background: var(--line); border-radius: 20px; padding: 1px 6px; }
.done-time { font-size: 10px; color: var(--ink-3); flex-shrink: 0; white-space: nowrap; }

.todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line); }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--ink-3); background: none; flex-shrink: 0; margin-top: 1px; }
.todo-body { flex: 1; }
.todo-text { font-size: 13px; line-height: 1.4; color: var(--ink); }
.todo-row2 { display: flex; gap: 4px; margin-top: 3px; }
.todo-tag-badge { font-size: 10px; color: var(--ink-2); background: var(--line); border-radius: 20px; padding: 1px 6px; }
.todo-time-badge { font-size: 10px; color: var(--ink-3); }

/* ── Bottom nav ── */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: color-mix(in oklch, var(--bg) 94%, transparent);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  display: flex; align-items: stretch; padding-bottom: 24px; z-index: 60;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 10px 0; border: none; background: none; cursor: pointer;
  font-family: var(--font); font-size: 10px; font-weight: 400;
  color: var(--ink-3); letter-spacing: .04em;
}
.nav-btn::before {
  content: ''; display: block; width: 4px; height: 4px; border-radius: 50%;
  background: transparent; margin-bottom: 1px; transition: .15s;
}
.nav-btn.active::before { background: var(--ink); }
.nav-btn.active { color: var(--ink); font-weight: 500; }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-fab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 6px 0; border: none; background: none; cursor: pointer;
}
.nav-fab-circle {
  width: 46px; height: 46px; border-radius: 50%; background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  color: var(--bg); font-size: 22px; font-weight: 300; line-height: 1;
  box-shadow: 0 2px 14px rgba(0,0,0,.22); margin-top: -20px;
}

/* ── Sheet sample ── */
.sheet-sample {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 50px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,.18), 0 0 0 10px oklch(18% 0 0);
  display: flex;
  flex-direction: column;
}
.sheet-bg { flex: 1; background: var(--bg); opacity: .4; }
.sheet-panel {
  background: var(--surface);
  border-radius: 26px 26px 0 0;
  padding: 0 24px 40px;
  flex-shrink: 0;
}
.sheet-handle { width: 32px; height: 4px; background: var(--line); border-radius: 2px; margin: 12px auto 20px; }
.sheet-title { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 20px; }
.input-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; display: block; }
.input-field {
  width: 100%; border: 1.5px solid var(--line); border-radius: 14px;
  padding: 14px 16px; font-family: var(--font); font-size: 15px;
  color: var(--ink); background: var(--bg); outline: none; margin-bottom: 16px;
}
.input-field.focused { border-color: var(--ink); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  font-size: 13px; padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--line); background: none; color: var(--ink-2);
  cursor: pointer; font-family: var(--font);
}
.chip.selected { background: var(--ink); border-color: var(--ink); color: var(--bg); }
.btn-save {
  width: 100%; padding: 16px; background: var(--ink); color: var(--bg); border: none;
  border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 500;
  cursor: pointer; letter-spacing: .02em;
}
</style>
</head>
<body>

<div>
  <div class="label">主畫面</div>
  <div class="phone">
    <header>
      <div class="header-top">
        <div class="logo">done<em>.</em></div>
        <div class="stats-pill">
          <div class="stat"><div class="stat-num">5</div><div class="stat-label">今日</div></div>
          <div class="stat"><div class="stat-num">142</div><div class="stat-label">總計</div></div>
        </div>
      </div>
    </header>

    <div class="date-strip-outer">
      <div class="date-strip-top">
        <div class="month-label">2026年4月</div>
      </div>
      <div class="date-strip">
        <div class="dpill"><span class="dow">一</span><span class="dnum">14</span><span class="ddot"></span></div>
        <div class="dpill today"><span class="dow">二</span><span class="dnum">15</span><span class="ddot"></span></div>
        <div class="dpill selected has-done"><span class="dow">三</span><span class="dnum">16</span><span class="ddot"></span></div>
        <div class="dpill has-done"><span class="dow">四</span><span class="dnum">17</span><span class="ddot"></span></div>
        <div class="dpill"><span class="dow">五</span><span class="dnum">18</span><span class="ddot"></span></div>
        <div class="dpill"><span class="dow">六</span><span class="dnum">19</span><span class="ddot"></span></div>
        <div class="dpill"><span class="dow">日</span><span class="dnum">20</span><span class="ddot"></span></div>
      </div>
    </div>

    <div class="sched-body">
      <div class="sched-col sched-col-left">
        <div class="sched-col-header">已完成</div>
        <div class="done-item">
          <div class="done-dot"></div>
          <div class="done-body">
            <div class="done-text">整理設計文檔</div>
            <div class="done-meta"><span class="done-tag">工作</span></div>
          </div>
        </div>
        <div class="done-item">
          <div class="done-dot"></div>
          <div class="done-body">
            <div class="done-text">晨跑 5km</div>
            <div class="done-meta"><span class="done-tag">健康</span></div>
          </div>
        </div>
        <div class="done-item">
          <div class="done-dot"></div>
          <div class="done-body">
            <div class="done-text">讀書 30 分鐘</div>
            <div class="done-meta"><span class="done-tag">學習</span></div>
          </div>
        </div>
        <div class="done-item">
          <div class="done-dot"></div>
          <div class="done-body">
            <div class="done-text">回覆客戶郵件</div>
            <div class="done-meta"><span class="done-tag">工作</span></div>
          </div>
        </div>
        <div class="done-item">
          <div class="done-dot"></div>
          <div class="done-body">
            <div class="done-text">冥想 15 分鐘</div>
            <div class="done-meta"><span class="done-tag">健康</span></div>
          </div>
        </div>
      </div>
      <div class="sched-col sched-col-right">
        <div class="sched-col-header">待辦</div>
        <div class="todo-item">
          <div class="todo-check"></div>
          <div class="todo-body">
            <div class="todo-text">週報整理</div>
            <div class="todo-row2"><span class="todo-tag-badge">工作</span><span class="todo-time-badge">18:00</span></div>
          </div>
        </div>
        <div class="todo-item">
          <div class="todo-check"></div>
          <div class="todo-body">
            <div class="todo-text">買菜</div>
            <div class="todo-row2"><span class="todo-tag-badge">生活</span></div>
          </div>
        </div>
        <div class="todo-item">
          <div class="todo-check"></div>
          <div class="todo-body">
            <div class="todo-text">複習語法</div>
            <div class="todo-row2"><span class="todo-tag-badge">學習</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="3"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        日程
      </button>
      <button class="nav-fab"><div class="nav-fab-circle">+</div></button>
      <button class="nav-btn">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        統計
      </button>
    </div>
  </div>
</div>

<div>
  <div class="label">記錄 Sheet</div>
  <div class="sheet-sample">
    <div class="sheet-bg"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">記錄完成</div>
      <label class="input-label">做了什麼</label>
      <div class="input-field focused" style="color:var(--ink-2)">完成了設計稿評審</div>
      <label class="input-label">分類</label>
      <div class="chips">
        <div class="chip selected">工作</div>
        <div class="chip">學習</div>
        <div class="chip">生活</div>
        <div class="chip">健康</div>
        <div class="chip">創作</div>
      </div>
      <button class="btn-save">保存</button>
    </div>
  </div>
</div>

</body>
</html>
